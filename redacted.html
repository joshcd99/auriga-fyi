<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[redacted]</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #05080f;
      overflow: hidden;
    }

    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /*
      Oversized iframe trick: scale up so YouTube's top bar (~60px),
      bottom controls (~60px), and watermark are cropped off-screen.
      pointer-events:none prevents hover from triggering controls.
    */
    .video-wrap {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-wrap iframe {
      width: 120vw;
      height: 120vh;
      border: none;
      pointer-events: none;
    }
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="video-wrap">
  <iframe
    id="yt"
    src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=0&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3&loop=1&playlist=dQw4w9WgXcQ&start=0&disablekb=1"
    allow="autoplay; encrypted-media"
    allowfullscreen
  ></iframe>
</div>

<script>
  /* ── STARFIELD (matches 404 / index) ── */
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function initStars(n = 260) {
    stars = Array.from({ length: n }, () => ({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + 0.2,
      a: Math.random() * 0.7 + 0.2,
      da: (Math.random() - 0.5) * 0.003,
    }));
  }
  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      s.a += s.da;
      if (s.a > 0.9 || s.a < 0.1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,220,255,${s.a})`;
      ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }
  resize(); initStars();
  window.addEventListener('resize', () => { resize(); initStars(); });
  drawStars();

  // Trap back navigation
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => {
    history.pushState(null, '', location.href);
  });
  document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>auriga.fyi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05080f;
      --surface: rgba(8, 14, 28, 0.85);
      --border: rgba(80, 140, 220, 0.18);
      --green: #6ee7a0;
      --green-dim: #3d8a5f;
      --blue: #7ab3f0;
      --amber: #f0c070;
      --muted: #3a4a60;
      --text: #c8ddf0;
      --star-line: rgba(90, 150, 255, 0.22);
      --star-node: rgba(140, 190, 255, 0.7);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      color: var(--text);
    }

    /* ── STARFIELD ── */
    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── CONSTELLATION SVG ── */
    #constellation {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      animation: fadeIn 2.4s ease 0.6s forwards;
    }

    .const-line {
      stroke: var(--star-line);
      stroke-width: 1.2;
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
    }

    .const-line.draw { animation: drawLine 1.4s ease forwards; }

    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }

    .const-star {
      fill: var(--star-node);
      filter: drop-shadow(0 0 5px rgba(140, 190, 255, 0.6));
      opacity: 0;
      transform-origin: center;
    }

    .const-star.appear {
      animation: starPop 0.4s ease forwards;
    }

    @keyframes starPop {
      0%   { opacity: 0; r: 0; }
      60%  { opacity: 1; r: 5px; }
      100% { opacity: 1; r: 3px; }
    }

    .const-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      fill: rgba(140, 190, 255, 0.45);
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }

    /* ── LAYOUT ── */
    #scene {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── TERMINAL WINDOW ── */
    .terminal {
      width: 100%;
      max-width: 540px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 0 1px rgba(100, 160, 255, 0.06),
        0 24px 64px rgba(0, 0, 0, 0.7),
        0 0 60px rgba(60, 120, 220, 0.08);
      opacity: 0;
      transform: translateY(12px);
      animation: terminalAppear 0.7s cubic-bezier(0.2, 0.8, 0.3, 1) 1.2s forwards;
    }

    @keyframes terminalAppear {
      to { opacity: 1; transform: translateY(0); }
    }

    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.025);
      border-radius: 10px 10px 0 0;
    }

    .dot {
      width: 11px; height: 11px;
      border-radius: 50%;
    }
    .dot.r { background: #f4645f; }
    .dot.y { background: #f5a623; }
    .dot.g { background: #27c93f; }

    .bar-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
      margin-right: auto;
      padding-right: 28px;
      letter-spacing: 0.05em;
    }

    .terminal-body {
      padding: 22px 24px 26px;
      min-height: 200px;
      font-size: 14px;
      line-height: 1.75;
      letter-spacing: 0.02em;
    }

    .line { display: block; white-space: pre; }

    .prompt { color: var(--green); }
    .cmd    { color: var(--text); }
    .dim    { color: var(--muted); }
    .oops   { color: var(--amber); }
    .proj-label { color: var(--green); }

    .proj-link {
      color: var(--blue);
      text-decoration: none;
      transition: color 0.2s, text-shadow 0.2s;
      border-bottom: 1px solid rgba(122, 179, 240, 0.3);
      padding-bottom: 1px;
    }
    .proj-link:hover {
      color: #b8d8ff;
      text-shadow: 0 0 12px rgba(122, 179, 240, 0.6);
      border-bottom-color: rgba(180, 215, 255, 0.6);
    }

    .project-row {
      display: flex;
      align-items: baseline;
      gap: 0;
      opacity: 0;
    }
    .project-row.visible { animation: fadeIn 0.4s ease forwards; }

    .proj-arrow { color: var(--green-dim); margin-right: 2px; }
    .proj-name  { min-width: 100px; }
    .proj-desc  { color: var(--muted); font-size: 12px; margin-left: 6px; }

    .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--green);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ── AURIGA LABEL ── */
    #auriga-label {
      position: fixed;
      bottom: 28px;
      right: 32px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(140, 190, 255, 0.25);
      z-index: 3;
      opacity: 0;
      animation: fadeIn 1s ease 3s forwards;
    }
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<svg id="constellation" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <!-- Auriga constellation: Capella(α), Menkalinan(β), θ, ι, ε, δ -->
  <!-- Positions scaled to viewBox, offset upper-right area -->
  <g id="const-group">
    <!-- Lines -->
    <line class="const-line" id="l1" x1="980" y1="160" x2="1120" y2="230" />
    <line class="const-line" id="l2" x1="1120" y1="230" x2="1160" y2="370" />
    <line class="const-line" id="l3" x1="1160" y1="370" x2="1050" y2="460" />
    <line class="const-line" id="l4" x1="1050" y1="460" x2="900" y2="380" />
    <line class="const-line" id="l5" x1="900" y1="380" x2="980" y2="160" />
    <line class="const-line" id="l6" x1="900" y1="380" x2="1050" y2="460" />

    <!-- Stars -->
    <circle class="const-star" id="s-capella"    cx="980" cy="160" r="4.5" /> <!-- α Capella (brightest) -->
    <circle class="const-star" id="s-menkalinan" cx="1120" cy="230" r="3"   />
    <circle class="const-star" id="s-theta"      cx="1160" cy="370" r="2.5" />
    <circle class="const-star" id="s-iota"       cx="1050" cy="460" r="2.5" />
    <circle class="const-star" id="s-epsilon"    cx="900" cy="380"  r="2.8" />
    <circle class="const-star" id="s-delta"      cx="1040" cy="290" r="2"   />

    <!-- Labels -->
    <text class="const-label" id="lbl-capella" x="990" y="152" style="animation-delay:2.8s">Capella</text>
    <text class="const-label" x="1128" y="224" style="animation-delay:3s">β</text>
    <text class="const-label" x="1168" y="368" style="animation-delay:3.1s">θ</text>
    <text class="const-label" x="1058" y="472" style="animation-delay:3.2s">ι</text>
    <text class="const-label" x="880"  y="396" style="animation-delay:3.1s">ε</text>
  </g>
</svg>

<div id="scene">
  <div class="terminal">
    <div class="terminal-bar">
      <span class="dot r"></span>
      <span class="dot y"></span>
      <span class="dot g"></span>
      <span class="bar-title">auriga.fyi — zsh</span>
    </div>
    <div class="terminal-body" id="terminal-body">
    </div>
  </div>
</div>

<div id="auriga-label">Auriga · The Charioteer</div>

<script>
  /* ── STARFIELD ── */
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars(n = 260) {
    stars = Array.from({ length: n }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + 0.2,
      a: Math.random() * 0.7 + 0.2,
      da: (Math.random() - 0.5) * 0.003,
    }));
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      s.a += s.da;
      if (s.a > 0.9 || s.a < 0.1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 220, 255, ${s.a})`;
      ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }

  resize();
  initStars();
  window.addEventListener('resize', () => { resize(); initStars(); });
  drawStars();

  /* ── CONSTELLATION ANIMATION ── */
  const lineDelays = { l1: 800, l2: 1150, l3: 1500, l4: 1850, l5: 2100, l6: 2350 };
  const starDelays = {
    's-capella': 750, 's-menkalinan': 1100, 's-theta': 1450,
    's-iota': 1800, 's-epsilon': 2050, 's-delta': 2300
  };

  for (const [id, delay] of Object.entries(lineDelays)) {
    setTimeout(() => {
      const el = document.getElementById(id);
      if (el) el.classList.add('draw');
    }, delay);
  }
  for (const [id, delay] of Object.entries(starDelays)) {
    setTimeout(() => {
      const el = document.getElementById(id);
      if (el) el.classList.add('appear');
    }, delay);
  }

  /* ── TYPEWRITER ── */
  const body = document.getElementById('terminal-body');

  const PROJECTS = [
    { name: 'Ember',     desc: 'personal finance tracker', href: 'https://ember.auriga.fyi' },
    { name: 'GreenStep', desc: 'sustainability challenge',  href: 'https://greenstep.auriga.fyi' },
  ];

  const SEQUENCE = [
    { type: 'prompt', text: '$ ', cmd: 'cd ~/auriga.fyi', delay: 1600 },
    { type: 'blank', delay: 180 },
    { type: 'output', text: '', oops: 'oops!', rest: ' were you looking for one of these?', delay: 0 },
    { type: 'blank', delay: 120 },
    { type: 'projects', delay: 0 },
  ];

  let cursorEl = null;

  function makeCursor() {
    const c = document.createElement('span');
    c.className = 'cursor';
    return c;
  }

  function appendLine(html = '') {
    const span = document.createElement('span');
    span.className = 'line';
    span.innerHTML = html;
    body.appendChild(span);
    return span;
  }

  async function typeText(el, text, speed = 42) {
    for (const ch of text) {
      el.textContent += ch;
      await sleep(speed + Math.random() * 28);
    }
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function runSequence() {
    await sleep(1600);

    // Line 1: prompt + typed command
    {
      const line = appendLine('<span class="prompt">$ </span>');
      const cmd = document.createElement('span');
      cmd.className = 'cmd';
      cursorEl = makeCursor();
      line.appendChild(cmd);
      line.appendChild(cursorEl);
      await typeText(cmd, 'cd ~/auriga.fyi', 55);
      await sleep(260);
      line.removeChild(cursorEl);
    }

    // Blank
    appendLine();
    await sleep(200);

    // Oops line
    {
      const line = appendLine(
        '<span class="oops">oops!</span><span class="dim"> were you looking for one of these?</span>'
      );
      await sleep(120);
    }

    // Blank
    appendLine();
    await sleep(100);

    // Project rows
    for (let i = 0; i < PROJECTS.length; i++) {
      const p = PROJECTS[i];
      const row = document.createElement('span');
      row.className = 'project-row line';
      row.innerHTML = `<span class="proj-arrow">→ </span><span class="proj-name"><a class="proj-link" href="${p.href}">${p.name}</a></span><span class="proj-desc">${p.desc}</span>`;
      body.appendChild(row);
      await sleep(60);
      row.classList.add('visible');
      await sleep(200);
    }

    // Trailing blank + blinking cursor
    appendLine();
    const last = appendLine('<span class="prompt">$ </span>');
    cursorEl = makeCursor();
    last.appendChild(cursorEl);
  }

  runSequence();
</script>
</body>
</html>
